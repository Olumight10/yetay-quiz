/* Reset and base styles */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;

}

/* === Layout === */
#online {
  display: flex;
  height: 100vh;

}

.sidebar {
  width: 15%;
  min-width: 200px;

  display: flex;

.yetay2 {

.parthead {

#participant {

}

.f-box {

}

.f-box:hover {

.current-participant {

@keyframes pulse {

.modal_menu {

.nav-bar {

/* Base style for all buttons */

.button-group {

/* Disabled state */

/* Gaps between rows */

.table-header {

/* Tools */

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyoL5_Wuef_TKE882CTQfLcBeVpyEThOTA_yVQ9IpayeThqDj3DoA9Vy6wpP8CkWDZ5/exec"; // your script URL here
const questionContainer = document.getElementById("question-view");
const gridContainer = document.getElementById("question-grid");
const confirmBtn = document.getElementById("confirm-btn");
const answerBtn = document.getElementById("answer-btn");
const scoreboardBtn = document.getElementById("scoreboard-btn");
const gridViewBtn = document.getElementById("grid-view");
let currentQuestionIndex = null;
let countdownInterval = null;
let currentParticipant = null;
let questions = [];
let participants = [];
let VperScore = null;
let VperTime = null;
let viewTimeup = false;
let rounding = 5; // Default rounding value
let currentRound = 1; // Default round
let currentTotal = 0;
let currentScore = 0;
let currentRow = null;
let currentScoreCells = [];
let queCount = 0; // Count of questions loaded



async function loadQuestions() {
  loadParameters();

  try {
    const response = await fetch(scriptURL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded'
      },
      body: JSON.stringify({ action: 'getOnlineQuestions' })
    });

    const data = await response.json();

    if (data.status === 'success') {
      questions = data.questions;
      participants = data.participants;
      await tableCollate()
      loadParticipants(participants);
      
      populateGrid(questions);
      
      document.getElementById("roundy").textContent  = currentRound > rounding ? "Extra" : currentRound;
    // Load hidden question views
    questionContainer.innerHTML = "";

    questions.forEach((q, i) => {
      const div = document.createElement("div");
      div.classList.add("question-box");
      div.id = `question-${i}`;
      div.style.display = "none";

      div.innerHTML = `
        <div class="question-card">
          <p class="question-text"><strong>Q${i + 1}:</strong> ${q["Question Text"] || '[No Question]'}</p>
          <div class="options">
            ${['A', 'B', 'C', 'D'].map(letter => `
              <div class="option">
                <span class="option-letter">${letter}.</span>
                <span class="option-text">${q[`Option ${letter}`] || '[Missing]'}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      questionContainer.appendChild(div);
      
    });
    
    // Show the button
    } else {
      alert("Failed to load questions: " + data.message);
    }
  } catch (error) {
    alert("Error fetching questions: " + error.message);
  }
}

async function tableCollate() {
  const scoreboard = document.getElementById("scoreboard");
  const theadRow = scoreboard.querySelector("thead tr");
  const tbody = scoreboard.querySelector("tbody");

  // STEP 0: Fetch OTG data from backend
  const payload = { action: "getOTG" };
  let OTG = [];

  try {
    const response = await fetch(scriptURL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: JSON.stringify(payload),
    });

    const result = await response.json();
    if (result.status === "success") {
      OTG = result.data;
    } else {
      console.error("Failed to load OTG:", result.message);
      return;
    }
  } catch (error) {
    console.error("Fetch error loading OTG:", error);
    return;
  }

  // STEP 1: Add additional round columns to header
  for (let r = 2; r <= rounding; r++) {
    const th = document.createElement("th");
    th.className = "round-score";
    th.textContent = `Round ${r}`;
    theadRow.insertBefore(th, theadRow.children[theadRow.children.length - 3]);
  }

  // STEP 2: Use the first row as a template, then remove it
  const baseRow = tbody.querySelector("tr");
  const template = baseRow.cloneNode(true);
  tbody.removeChild(baseRow);

  // STEP 3: Add missing round columns to template if needed
  const roundScoreTDs = template.querySelectorAll(".round-score");
  for (let r = roundScoreTDs.length + 1; r <= rounding; r++) {
    const td = document.createElement("td");
    td.className = "round-score";
    td.textContent = "-";
    template.insertBefore(td, template.children[template.children.length - 3]);
  }

  // STEP 4: Populate rows from OTG data
  OTG.forEach((entry, i) => {
    const [username, ...scores] = entry;
    const row = template.cloneNode(true);
    row.dataset.participant = i;

    // Fill name
    row.querySelector("td").textContent = username;

    // Fill normal round scores
    const roundCells = row.querySelectorAll(".round-score");
    for (let r = 0; r < rounding; r++) {
      const val = scores[r];
      roundCells[r].textContent = val === "" || val === undefined ? "-" : val;
    }

    // ⚡️ Fill Round X (cell just before total-score)
    const roundXCell = row.children[row.children.length - 3];
    roundXCell.textContent = parseInt(scores[rounding], 10) || 0;

    // Fill total score (after Round X)
    const totalCell = row.querySelector(".total-score");
    totalCell.textContent = parseInt(scores[rounding + 1], 10) || 0;

    // Setup eye toggle
    const eyeIcon = row.querySelector(".eye-toggle");
    eyeIcon.textContent = "👁️";
    eyeIcon.dataset.open = "false";

    tbody.appendChild(row);
  });

  // STEP 5: Eye toggle logic
  const toggleEye = (icon) => {
    const isOpen = icon.dataset.open === "true";
    icon.textContent = isOpen ? "👁️" : "🙈";
    icon.dataset.open = (!isOpen).toString();
  };

  scoreboard.querySelectorAll(".eye-toggle").forEach((icon) => {
    icon.addEventListener("click", () => toggleEye(icon));
  });

  // ✅ STEP 6: Determine & set currentRound, currentParticipant, queCount
  currentRound = null;
  currentParticipant = null;
  queCount = null;

  const participantRows = [...tbody.querySelectorAll("tr")];
  let found = false;

  for (let r = 1; r <= rounding; r++) {
    for (let i = 0; i < participantRows.length; i++) {
      const row = participantRows[i];
      const cells = row.querySelectorAll("td");
      const roundCell = cells[r];

      if (roundCell && roundCell.textContent.trim() === "-") {
        currentRound = r;
        currentParticipant = cells[0].textContent.trim();
        queCount = i;
        found = true;
        break;
      }
    }
    if (found) break;
  }

  // 🔁 All rounds are filled
  if (!found) {
    currentRound = rounding + 1;
    const firstRow = participantRows[0];
    currentParticipant = firstRow?.querySelector("td")?.textContent.trim() || null;
    queCount = 0;
  }

  console.log({ currentRound, currentParticipant, queCount, rounding });
}


function loadParticipants(participants) {

function highlightCurrentParticipantRow() {
  const table = document.getElementById("scoreboard");
  const rows = table.querySelectorAll("tbody tr");

  rows.forEach(row => {
    // Remove previous highlight
    row.classList.remove("highlighted");

    // Hide tools and reset eye icons
    const adjusterCell = row.querySelector(".adjuster-cell");
    if (adjusterCell) {
      const tools = adjusterCell.querySelector(".tools");
      const openEye = adjusterCell.querySelector(".open-eye");
      const closedEye = adjusterCell.querySelector(".closed-eye");

      if (tools) tools.style.display = "none";
      if (openEye) {
        openEye.style.display = "inline-block";
        openEye.dataset.open = "false";
      }
      if (closedEye) closedEye.style.display = "none";
    }
  });

  // Highlight the correct row and extract scores
  rows.forEach(row => {
    const firstCell = row.querySelector("td");
    if (firstCell && firstCell.textContent.trim() === currentParticipant) {
      row.classList.add("highlighted");
      currentRow = row;

      // 🔹 Get all score cells (skip first column and total/adjuster columns)
      const allCells = row.querySelectorAll("td");

      currentScoreCells = [];

      if (currentRound <= rounding) {
        // 🔹 Collect score cells for rounds up to currentRound
        allCells.forEach((cell, index) => {
          if (index > 0 && index <= currentRound) {
            currentScoreCells.push(cell);
          }
        });

        // 🔹 Get score for current round (assumes round starts from column 2)
        const roundCell = allCells[currentRound]; 
        const rawScore = roundCell.textContent.trim();
        currentScore = rawScore === "-" ? null : parseInt(rawScore);
      } else {
        // 🔸 Bypass scoring logic if currentRound > rounding
        const roundCell = allCells[allCells.length - 3]; 
        const rawScore = roundCell.textContent.trim();
        currentScore = rawScore === "-" ? 0 : parseInt(rawScore);
      }

      // 🔹 Get total score (assume total is second-to-last cell)
      const totalCell = allCells[allCells.length - 2];
      // 🔹 Get total score
      const rawTotal = totalCell.textContent.trim();
      currentTotal = parseInt(rawTotal);

      // 🔹 Show tools
      const adjusterCell = row.querySelector(".adjuster-cell");
      if (adjusterCell) {
        const tools = adjusterCell.querySelector(".tools");
        const openEye = adjusterCell.querySelector(".open-eye");
        const closedEye = adjusterCell.querySelector(".closed-eye");

        if (tools) tools.style.display = "flex";
        if (openEye) openEye.style.display = "none";
        if (closedEye) closedEye.style.display = "inline-block";

        openEye.dataset.open = "true";
        closedEye.dataset.open = "true";
      }
      // Optional scroll into view
      // row.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  });
}

function moveToNextParticipant() {
  const boxes = document.querySelectorAll("#participant .f-box");
  const currentIndex = Array.from(boxes).findIndex(
    box => box.classList.contains("current-participant")
  );

  // Remove current highlight
  if (currentIndex !== -1) {
    boxes[currentIndex].classList.remove("current-participant");
  }

  // Calculate next index with wrap-around
  const nextIndex = (currentIndex + 1) % boxes.length;

  // Highlight next participant
  boxes[nextIndex].classList.add("current-participant");

  // Update global currentParticipant
  currentParticipant = boxes[nextIndex].textContent;
}


function populateGrid(questions) {
  gridContainer.innerHTML = "";
  questionContainer.style.display = 'none'; // Hide question container initially
  confirmBtn.classList.remove('hidden');
  confirmBtn.classList.add('disabled');

  questions.forEach((q, i) => {
    const gridBtn = document.createElement("div");
    gridBtn.className = "g-btn";
    gridBtn.setAttribute('role', 'button');
    gridBtn.setAttribute('tabindex', '0');
    gridBtn.textContent = i + 1;
    gridBtn.dataset.index = i;

    if (q.Picked_Ans) {
      gridBtn.onclick = () => {
        currentQuestionIndex = i;
        confirmBtn.classList.add('disabled'); 
        resetUnmarkedGrids(i);
      };
    } else {
      gridBtn.onclick = () => {
        activateGrid(i);
      };
    }

    gridContainer.appendChild(gridBtn);

    if (q.Picked_Ans) {
      markedGrid(i); // mark green
    }
  });
}


function activateGrid(index) {
  // Reset only buttons that are NOT marked green
  document.querySelectorAll(".g-btn").forEach((btn, i) => {
    const isMarked = btn.classList.contains("marked-green");
    if (!isMarked && i !== index) {
      btn.classList.remove("active-grid");
    }
  });

  const btn = gridContainer.children[index];
  btn.classList.add("active-grid");
  currentQuestionIndex = index;
  confirmBtn.classList.remove("disabled");
}

function markedGrid(index) {
  const btn = gridContainer.children[index];
  btn.classList.add("marked-green");
  btn.classList.remove("active-grid"); // in case it's active, marked overrides it

  btn.onclick = () => {
    currentQuestionIndex = index;
    confirmBtn.classList.add("disabled"); 
    resetUnmarkedGrids(index);
  };
}

// Optional: Reset non-marked grids (used by picked ones to reset others)
function resetUnmarkedGrids(activeIndex) {
  document.querySelectorAll(".g-btn").forEach((btn, i) => {
    if (!btn.classList.contains("marked-green") && i !== activeIndex) {
      btn.classList.remove("active-grid");
    }
  });
}

function startCountdown(durationMinutes) {
  const timerDisplay = document.getElementById("quizTimer");
  const timeSpan = timerDisplay.querySelector(".detime");
  let timeLeft = durationMinutes * 60; // Convert to seconds

  if (countdownInterval) clearInterval(countdownInterval); // Clear old timer if any

  // Show timer
  timerDisplay.style.display = "block";
  document.getElementById("perScoreContainer").style.display = "none"; // Hide input field
  document.getElementById("perTimeContainer").style.display = "none"; // Hide input field

  // Update every second
  countdownInterval = setInterval(() => {
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;

    timeSpan.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

    if (timeLeft <= 0) {
      clearInterval(countdownInterval);
      timeSpan.textContent = "00:00";
      onCountdownEnd();
    }

    timeLeft--;
  }, 1000);
}

function toggleTools(eyeIcon) {
  const adjusterCell = eyeIcon.closest('.adjuster-cell');
  const openEye = adjusterCell.querySelector('.open-eye');
  const closedEye = adjusterCell.querySelector('.closed-eye');
  const toolsDiv = adjusterCell.querySelector('.tools');

  const isOpen = eyeIcon.dataset.open === "true";

  if (isOpen) {
    // Hide tools, show closed eye
    toolsDiv.style.display = "none";
    openEye.style.display = "inline-block";
    closedEye.style.display = "none";

    openEye.dataset.open = "false";
    closedEye.dataset.open = "false";
  } else {
    // Show tools, show open eye
    toolsDiv.style.display = "flex";
    openEye.style.display = "none";
    closedEye.style.display = "inline-block";

    openEye.dataset.open = "true";
    closedEye.dataset.open = "true";
  }
}


function handlePlay() {
  if (currentRound <= rounding) {
    if (currentScore !== null) {
      const roundCell = currentRow.querySelectorAll("td")[currentRound];
      const totalCell = currentRow.querySelectorAll("td")[currentRow.cells.length - 2];
      sendScoreUpdate(currentRow.rowIndex, currentRound, roundCell.textContent, totalCell.textContent);
      hideTools();
      return;
    }

    // Assign score to round cell
    currentScore = VperScore;
    const roundCell = currentRow.querySelectorAll("td")[currentRound];
    roundCell.textContent = currentScore;

    // Update total
    currentTotal = currentTotal + VperScore;
    const totalCell = currentRow.querySelectorAll("td")[currentRow.cells.length - 2];
    totalCell.textContent = currentTotal;

    // Send both round and total update
    sendScoreUpdate(currentRow.rowIndex, currentRound, currentScore, currentTotal);
  } else {
      const roundCell = currentRow.querySelectorAll("td")[currentRow.cells.length - 3];
      const totalCell = currentRow.querySelectorAll("td")[currentRow.cells.length - 2];
      sendScoreUpdate(currentRow.rowIndex, rounding + 1, roundCell.textContent, totalCell.textContent);
  }

  hideTools();
}


function handleRewind() {
  const roundCell = currentRow.querySelectorAll("td")[currentRound];
  const totalCell = currentRow.querySelectorAll("td")[currentRow.cells.length - 2];

  if (currentRound <= rounding) {
    if (currentScore === null) {
      currentScore = 0;
      roundCell.textContent = currentScore;

      sendScoreUpdate(currentRow.rowIndex, currentRound, currentScore, totalCell.textContent);
      // No change to total
    } else {
      currentTotal = currentTotal - currentScore;
      currentScore = 0;
      roundCell.textContent = currentScore;
      totalCell.textContent = currentTotal;
      // Send update for both round and total
      sendScoreUpdate(currentRow.rowIndex, currentRound, currentScore, currentTotal);
    }
  }

  else {
      const roundCell = currentRow.querySelectorAll("td")[currentRow.cells.length - 3];
      const totalCell = currentRow.querySelectorAll("td")[currentRow.cells.length - 2];
      sendScoreUpdate(currentRow.rowIndex, rounding + 1, roundCell.textContent, totalCell.textContent);
  }

  hideTools();
}

async function sendScoreUpdate(rowIndex, roundIndex, roundScore, totalScore) {
  const payload = {
    action: "updateOTGScore",
    row: rowIndex + 1, // +2 since Sheets are 1-indexed and row 1 is header
    roundCol: roundIndex + 1,
    roundScore,
    totalCol: currentRow.cells.length - 1,
    totalScore
  };

  try {
    const response = await fetch(scriptURL, {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: JSON.stringify(payload)
    });

    const result = await response.json();
    if (result.status === "success") {
      console.log("Score update successful");
    } else {
      console.warn("Backend returned non-success status", result);
    }
  } catch (error) {
    console.error("Score update failed", error);
  }
}

function handlePlus() {


  if (currentRound <= rounding) {
    const roundCell = currentRow.querySelectorAll("td")[currentRound];
    const totalCell = currentRow.querySelectorAll("td")[currentRow.cells.length - 2];
    if (currentScore === null) currentScore = 0;
    if (currentScore < VperScore) {
      currentScore += 1;
      roundCell.textContent = currentScore;
      currentTotal += 1;
      totalCell.textContent = currentTotal;
    }
    // tools remain visible
  }

  else {
    const roundCell = currentRow.querySelectorAll("td")[currentRow.cells.length - 3];
    const totalCell = currentRow.querySelectorAll("td")[currentRow.cells.length - 2];

    currentScore += 1;
    roundCell.textContent = currentScore;

    currentTotal += 1;
    totalCell.textContent = currentTotal;
  }
}


function handleMinus() {
  const roundCell = currentRow.querySelectorAll("td")[currentRound];
  const totalCell = currentRow.querySelectorAll("td")[currentRow.cells.length - 2];


  if (currentRound <= rounding) {
    if (currentScore === null) currentScore = 0;
    if (currentScore > 0) {
      currentScore -= 1;
      roundCell.textContent = currentScore;
      currentTotal -= 1;
      totalCell.textContent = currentTotal;
    }
  }
  else {
    const roundCell = currentRow.querySelectorAll("td")[currentRow.cells.length - 3];
    const totalCell = currentRow.querySelectorAll("td")[currentRow.cells.length - 2];

    currentScore -= 1;
    roundCell.textContent = currentScore;

    currentTotal -= 1;
    totalCell.textContent = currentTotal;
  }
  // tools remain visible
}

function hideTools() {
  document.getElementById('grid-view')?.classList.remove('disabled');
  const adjusterCell = currentRow.querySelector(".adjuster-cell");
  if (adjusterCell) {
    const tools = adjusterCell.querySelector(".tools");
