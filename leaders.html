<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Leaderboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* Reset */
* {
  margin: 0; padding: 0; box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background-color: #213E6D;
  color: white;
  overflow-x: hidden;
}

.main-content {
  width: 100%;
  min-height: 100vh;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* === Table === */
#scoreboard {
  border-collapse: separate;
  border-spacing: 0 8px;
  width: 95%;
  margin: 10px auto;
}

.table-header {
  background: #213E6D;
  color: #F3C32F;
  font-weight: bold;
  border-left: 6px solid #F3C32F;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
}

#scoreboard thead th {
  padding: 0.6rem;
  text-align: center;
}

.score-row {
  background: #2e4f8a;
  color: white;
  border-radius: 8px;
}

.score-row td {
  padding: 0.6rem;
  text-align: center;
}

/* === Buttons === */
.button-bar {
  display: flex;
  justify-content: space-between;
  width: 95%;
  margin-top: 0px;
}

.bot {
  padding: 12px 20px;
  border-radius: 8px;
  background-color: #3a6cf4;
  color: white;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}
.bot:hover { background-color: #2f55c0; }

/* === Runner-up view === */
.runnerup-view {
  display: none;
  width: 95%;
  margin-top: 20px;
}

.winner-card {
  width: 100%;
  margin: 15px 0;
  padding: 25px;
  border-radius: 14px;
  font-size: 22px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: space-between;
  animation: fadeIn 0.8s ease-in-out;
}

.winner-card i {
  font-size: 36px;
  margin-right: 15px;
}

.gold   { background: linear-gradient(135deg, #FFD700, #E6BE8A); color: #213E6D; }
.silver { background: linear-gradient(135deg, #C0C0C0, #A9A9A9); color: #213E6D; }
.bronze { background: linear-gradient(135deg, #CD7F32, #8B4513); color: #fff; }

@keyframes fadeIn {
  from { transform: translateY(30px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

/* === Celebration Confetti === */
.confetti {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: hidden;
  z-index: 1000;
}

.confetti span {
  position: absolute;
  width: 12px; height: 12px;
  background: #F3C32F;
  opacity: 0.7;
  animation: fall 5s linear infinite;
}

.confetti span:nth-child(3n)  { background: #FF4C4C; }
.confetti span:nth-child(5n)  { background: #4CFF72; }
.confetti span:nth-child(7n)  { background: #4CA6FF; }

@keyframes fall {
  0%   { transform: translateY(-100%) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="main-content">
  <h2>Yetay Bible Quiz Leaderboard</h2>

  <!-- Table -->
  <table id="scoreboard">
    <thead>
      <tr class="table-header">
        <th>Name</th>
        <th>Round 1</th>
        <th>Round X</th>
        <th>Total</th>
        <th>Position</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- Buttons -->
  <div class="button-bar">
    <button class="bot" onclick="window.location.href='online.html'"><i class="fa fa-arrow-left"></i> Back</button>
    <button class="bot" id="toggleViewBtn">Show Winners</button>
  </div>

  <!-- Runner-up Winners -->
  <div class="runnerup-view" id="runnerupView"></div>
</div>

<!-- Confetti Celebration -->
<div class="confetti" id="confetti"></div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyoL5_Wuef_TKE882CTQfLcBeVpyEThOTA_yVQ9IpayeThqDj3DoA9Vy6wpP8CkWDZ5/exec";
let rounding = 5;
let OTG = [];

// Helper function for ordinal numbers
function getOrdinal(n) {
  const s = ["th", "st", "nd", "rd"];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

async function tableCollate() {
  const tbody = document.querySelector("#scoreboard tbody");
  const theadRow = scoreboard.querySelector("thead tr");
  tbody.innerHTML = "";

  // Fetch OTG
  try {
    const res = await fetch(scriptURL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: JSON.stringify({ action: "getOTG" }),
    });
    const result = await res.json();
    if (result.status === "success") { OTG = result.data; }
    else return console.error("Error:", result.message);
  } catch (err) { return console.error("Fetch error:", err); }

  // Build rows with totals
  let rows = OTG.map((entry) => {
    const [username, ...scores] = entry;
    const total = parseInt(scores[rounding + 1], 10) || 0;
    return { username, scores, total };
  });

  // STEP 1: Add additional round columns to header
  for (let r = 2; r <= rounding; r++) {
    const th = document.createElement("th");
    th.className = "round-score";
    th.textContent = `Round ${r}`;
    theadRow.insertBefore(th, theadRow.children[theadRow.children.length - 3]);
  }

  // Sort high → low
  rows.sort((a, b) => b.total - a.total);

  // Populate table
  rows.forEach((entry, idx) => {
    const tr = document.createElement("tr");
    tr.className = "score-row";
    tr.innerHTML = `
      <td>${entry.username}</td>
      ${Array.from({length: rounding}, (_, r) => `<td>${entry.scores[r] || "-"}</td>`).join("")}
      <td>${parseInt(entry.scores[rounding], 10) || 0}</td>
      <td>${entry.total}</td>
      <td>${getOrdinal(idx + 1)}</td>
    `;
    tbody.appendChild(tr);
  });

  renderWinners(rows);
}


function renderWinners(rows) {
  const view = document.getElementById("runnerupView");
  view.innerHTML = "";
  const top3 = rows.slice(0, 3);

  const labels = ["🏆 Winner", "🥈 1st Runner-up", "🥉 2nd Runner-up"];

  top3.forEach((w, i) => {
    const div = document.createElement("div");
    div.className = "winner-card " + (i === 0 ? "gold" : i === 1 ? "silver" : "bronze");
    div.innerHTML = `
      <i class="fa fa-trophy"></i>
      <span>${labels[i]}: ${w.username}</span>
      <span>Score: ${w.total}</span>
    `;
    view.appendChild(div);
  });
}


let confettiInterval; // store interval ID globally

document.getElementById("toggleViewBtn").addEventListener("click", () => {
  const table = document.getElementById("scoreboard");
  const runnerup = document.getElementById("runnerupView");
  const btn = document.getElementById("toggleViewBtn");

  if (table.style.display !== "none") {
    table.style.display = "none";
    runnerup.style.display = "block";
    btn.textContent = "Show Table";

    // start confetti effect
    confettiInterval = setInterval(launchConfetti, 1500);
  } else {
    table.style.display = "table";
    runnerup.style.display = "none";
    btn.textContent = "Show Winners";

    // stop confetti effect
    clearInterval(confettiInterval);
  }
});


/* 🎉 Generate Confetti */
function launchConfetti() {
  const confetti = document.getElementById("confetti");
  for (let i = 0; i < 40; i++) {
    const span = document.createElement("span");
    span.style.left = Math.random() * 100 + "vw";
    span.style.animationDuration = (3 + Math.random() * 2) + "s";
    confetti.appendChild(span);
    setTimeout(() => span.remove(), 5000);
  }
}


window.onload = tableCollate;
</script>
</body>
</html>
